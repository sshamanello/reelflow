name: Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  # ================================================================
  # BUILD
  # ================================================================
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ================================================================
  # DEPLOY WORKER — develop → staging
  # ================================================================
  deploy-worker-staging:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Deploy worker to staging
        run: npx wrangler deploy --env dev

      - name: Set TikTok secrets
        run: |
          echo "${{ secrets.TIKTOK_CLIENT_KEY }}"    | npx wrangler secret put TIKTOK_CLIENT_KEY    --env dev
          echo "${{ secrets.TIKTOK_CLIENT_SECRET }}" | npx wrangler secret put TIKTOK_CLIENT_SECRET --env dev

  # ================================================================
  # DEPLOY WORKER — main → production
  # ================================================================
  deploy-worker-production:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Deploy worker to production
        run: npx wrangler deploy --env production

      - name: Set TikTok secrets
        run: |
          echo "${{ secrets.TIKTOK_CLIENT_KEY }}"    | npx wrangler secret put TIKTOK_CLIENT_KEY    --env production
          echo "${{ secrets.TIKTOK_CLIENT_SECRET }}" | npx wrangler secret put TIKTOK_CLIENT_SECRET --env production

  # ================================================================
  # DEPLOY FRONTEND — main → reg.ru (FTPS)
  # ================================================================
  deploy-frontend:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Upload to reg.ru via FTPS
        run: |
          echo '<!DOCTYPE html><html><head><meta charset="UTF-8"><meta http-equiv="refresh" content="0; url=/ReelFlow/"><title>ReelFlow</title></head><body><script>window.location.replace("/ReelFlow/");</script></body></html>' > root-index.html
          REGRU_ROOT=$(dirname $REGRU_PATH)
          lftp -c "set ftps:initial-prot ''; set ftp:ssl-force true; set ftp:ssl-protect-data true; set ssl:verify-certificate false; set ftp:umask 022; open -u $REGRU_USER,$REGRU_PASSWORD ftp://$REGRU_HOST; mkdir -p $REGRU_PATH; lcd dist; mirror --reverse --verbose --include-glob .htaccess . $REGRU_PATH/; chmod 755 $REGRU_PATH; put ../root-index.html -o $REGRU_ROOT/index.html; quit"
        env:
          REGRU_HOST: ${{ secrets.REGRU_HOST }}
          REGRU_USER: ${{ secrets.REGRU_USER }}
          REGRU_PASSWORD: ${{ secrets.REGRU_PASSWORD }}
          REGRU_PATH: ${{ secrets.REGRU_PATH }}
